<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Filmes</title>
    <link rel="stylesheet" href="style2.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="header-content">
            <h1>Cine<span>Maxss</span></h1>

        </div>
        <div class="filter-container">
            <label for="genreFilter">Filtrar por gênero:</label>
            <select id="genreFilter">
                <option value="all">Todos os gêneros</option>
            </select>
        </div>
    </header>

    <main>
        <div id="catalogo" class="catalogo"></div>

        <div class="pagination">
            <button id="prevPage" class="page-btn" disabled>← Anterior</button>
            <span id="pageInfo" class="page-info">Página 1</span>
            <button id="nextPage" class="page-btn" disabled>Próxima →</button>
        </div>
    </main>

    <footer class="footer">
        <p>Dados fornecidos por <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">The Movie Database
                (TMDB)</a></p>
    </footer>

    <!-- Modal de detalhes -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <button class="modal-close" id="closeModalBtn">&times;</button>
            <div class="modal-content">
                <div class="modal-poster">
                    <img id="modalPoster" src="" alt="Poster do filme">
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <div id="modalGenres" class="modal-genres"></div>
                    <div class="modal-rating">
                        <span id="modalStars"></span>
                        <span id="modalVote"></span>
                    </div>
                    <div class="modal-date">
                        <span id="modalRelease"></span>
                    </div>
                    <div class="modal-synopsis">
                        <h3>Sinopse</h3>
                        <p id="modalOverview"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
